<style>
  .center-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; position: relative; z-index: 10; }
  .auth-card { width: 100%; max-width: 420px; background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1); padding: 40px 30px; box-sizing: border-box; }
  .auth-header { text-align: center; margin-bottom: 25px; }
  .auth-header h1 { font-size: 28px; font-weight: 800; margin-bottom: 5px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .auth-header p { color: #64748b; font-size: 14px; margin: 0; }
  .form-group { margin-bottom: 15px; }
  .form-label { display: block; color: #334155; font-weight: 600; font-size: 12px; margin-bottom: 5px; text-align: left; }
  .input-wrapper .form-control { width: 100%; background: #f8fafc; border: 2px solid transparent; border-radius: 10px; padding: 12px !important; color: #334155; font-size: 15px; font-weight: 500; text-align: center; box-sizing: border-box; transition: 0.3s; }
  .input-wrapper .form-control:focus { outline: none; background: white; border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
  .btn-auth { width: 100%; border: none; border-radius: 10px; padding: 14px; font-weight: 700; font-size: 15px; cursor: pointer; background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; margin-top: 15px; transition: 0.3s; }
  .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(16, 185, 129, 0.45); }
  .custom-divider { border: 0; height: 1px; background: #e2e8f0; margin: 20px 0; }
</style>

<div id="loginView" class="view-container active">
  <div class="bg-pattern"></div>
  
  <div class="center-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Phù Sa Farm</h1>
        <p>Đăng nhập hệ thống</p>
      </div>
      
      <div class="form-group">
        <label class="form-label">Tài khoản</label>
        <div class="input-wrapper">
          <input type="text" id="login_username" class="form-control" placeholder="Nhập tài khoản..." autocomplete="off">
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Mật khẩu</label>
        <div class="input-wrapper">
          <input type="password" id="login_password" class="form-control" placeholder="Nhập mật khẩu..." autocomplete="off">
        </div>
      </div>
      
      <button type="button" id="btnLoginSubmit" class="btn-auth" onclick="doLogin()">
        Đăng nhập
      </button>
      
      <div id="loginErrorBox" class="error-msg" style="display:none; margin-top:15px; color: #ef4444; font-weight: bold; text-align: center; font-size: 13px;"></div>
      
      <hr class="custom-divider">
      
      <button type="button" class="w-100" onclick="doLogout()" style="background: none; border: none; color: #ef4444; font-weight: bold; cursor: pointer;">
        Đăng xuất tài khoản
      </button>
    </div>
  </div>
</div>
