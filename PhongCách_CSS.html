<style>
  :root {
      --primary-color: #10b981;
      --accent-color: #34d399;
      --bg-color: #f0f4f8;
      --text-main: #1e293b;
      --danger: #d32f2f;
      --success-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
      --glass-bg: rgba(255, 255, 255, 0.98);
      --accent-green: #10b981;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
  }
  
  body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg-color); 
      margin: 0;
      padding: 15px; 
      color: var(--text-main); 
      position: relative;
      min-height: 100vh;
      padding-bottom: 80px !important; /* Đệm chân chống đè lấp nội dung khi xuất hiện thanh Bottom Bar dính đáy */
  }
  
  /* --- CẢNH BÁO IN-APP --- */
  #inAppWarning {
    display: none;
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
    padding: 30px; text-align: center; box-sizing: border-box;
  }
  .btn-copy { 
      background: #1877f2; color: white;
      border: none; padding: 15px 25px;
      border-radius: 8px; font-weight: bold; width: 100%; max-width: 300px; cursor: pointer;
      touch-action: manipulation;
  }

  /* --- SPA CONTAINER --- */
  .view-container { display: none;
    animation: fadeIn 0.4s ease-in-out; position: relative;
    z-index: 10;}
  .view-container.active { display: block;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px);
    } to { opacity: 1; transform: translateY(0);
  } }

  /* --- NỀN LANDING PAGE (GLOW & ICONS) --- */
  .bg-pattern { position: fixed;
    top: 0;
    left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 0; pointer-events: none;
  }
  .bg-pattern::before { 
      content: ''; position: absolute; width: 100%; height: 100%;
      background: radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.08) 0%, transparent 50%), radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
  }
  .floating-icons { position: absolute; width: 100%; height: 100%; }
  .floating-icon { 
      position: absolute; font-size: 32px; opacity: 0.15;
      animation: icon-float 20s ease-in-out infinite; color: #10b981;
      will-change: transform, opacity;
  }
  .icon-1 { top: 10%; left: 10%; font-size: 40px;
  }
  .icon-2 { top: 20%; left: 80%; font-size: 28px; animation-delay: -2s; }
  .icon-3 { top: 70%; left: 15%;
      font-size: 35px; animation-delay: -4s; }
  .icon-4 { top: 80%; left: 75%; font-size: 30px; animation-delay: -6s;
  }
  .icon-5 { top: 40%; left: 50%; font-size: 45px; animation-delay: -8s; opacity: 0.08;}
  .icon-6 { top: 15%;
      left: 45%; font-size: 25px; animation-delay: -3s; }
  .icon-7 { top: 60%; left: 85%; font-size: 32px; animation-delay: -5s;
  }
  .icon-8 { top: 85%; left: 40%; font-size: 38px; animation-delay: -7s;
  }
  
  @keyframes icon-float {
      0%, 100% { transform: translateY(0) rotate(0deg);
      opacity: 0.15;}
      50% { transform: translateY(-20px) rotate(5deg);
      opacity: 0.25;}
  }
  .glow-orbs { position: absolute; width: 100%; height: 100%; }
  .glow-orb { 
      position: absolute;
      border-radius: 50%; filter: blur(60px); opacity: 0.4; animation: orb-pulse 15s ease-in-out infinite; 
      will-change: transform, opacity;
  }
  .orb-1 { width: 300px; height: 300px;
      background: rgba(16, 185, 129, 0.2); top: -100px; left: -100px; }
  .orb-2 { width: 250px; height: 250px;
      background: rgba(52, 211, 153, 0.2); bottom: -80px; right: -80px; animation-delay: -5s;
  }
  @keyframes orb-pulse { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.2); opacity: 0.6;
  } }

  /* --- AUTH CONTAINER (CĂN GIỮA TUYỆT ĐỐI) --- */
  .center-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      z-index: 10;
  }

  .auth-card { 
      width: 100%; 
      max-width: 420px;
      background: var(--glass-bg); 
      border-radius: 20px;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
      padding: 40px 30px;
      box-sizing: border-box;
  }
  
  .auth-header { text-align: center; margin-bottom: 25px;
  }
  .auth-header h1 { 
      font-size: 28px; font-weight: 800; margin-bottom: 5px; 
      background: var(--success-gradient);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
  }
  .auth-header p { color: var(--text-secondary); font-size: 14px;
  }
  
  .form-group { margin-bottom: 15px; }
  .form-label { display: block; color: var(--text-main); font-weight: 600; font-size: 12px;
      margin-bottom: 5px; text-align: left; }
  .input-wrapper { position: relative;
  }
  
  .input-wrapper .form-control { 
      width: 100%; background: #f8fafc;
      border: 2px solid transparent; border-radius: 10px; 
      padding: 12px 38px 12px 38px !important; color: var(--text-main); font-size: 15px; 
      font-weight: 500;
      transition: all 0.3s ease; box-sizing: border-box; text-align: center;
  }
  .input-wrapper .form-control:focus { 
      outline: none;
      background: white; border-color: var(--accent-green); 
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); 
  }
  .input-icon { position: absolute;
      left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; transition: all 0.3s ease;
  }
  .input-wrapper .form-control:focus ~ .input-icon { color: var(--accent-green); }
  
  .btn-auth { 
      width: 100%;
      border: none; border-radius: 10px; padding: 14px; font-weight: 700; 
      font-size: 15px; cursor: pointer; transition: all 0.3s ease; display: flex; 
      align-items: center;
      justify-content: center; gap: 8px; margin-top: 15px; 
      background: var(--success-gradient); color: white; box-shadow: 0 6px 25px rgba(16, 185, 129, 0.35);
      touch-action: manipulation;
  }
  .btn-auth:hover { transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(16, 185, 129, 0.45); }

  .custom-divider {
      border: 0;
      border-top: 1px solid #e2e8f0;
      margin: 25px 0 15px 0;
  }

  .history-action {
      display: flex;
      align-items: center; justify-content: center;
      color: #64748b; font-size: 14px; font-weight: 500; cursor: pointer;
      padding: 12px; border-radius: 8px; transition: all 0.3s ease;
      touch-action: manipulation;
  }
  .history-action:hover {
      color: var(--primary-color);
      background-color: #f0fdf4;
  }
  
  .trust-badges { display: flex; justify-content: center; gap: 15px;
  }
  .trust-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #94a3b8; font-weight: 500;
  }
  .trust-badge i { color: #10b981; font-size: 13px; }

  /* --- MAIN APP CSS (GIAO DIỆN CHÍNH TRANG NHẬP SỐ) --- */
  .main-wrapper { display: grid;
      grid-template-columns: 350px 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
  .input-section { display: flex; flex-direction: column; gap: 20px;
  }
  .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: relative; width: 100%;
      box-sizing: border-box;}
  .card h3 { margin: 0 0 15px 0; font-size: 18px; border-bottom: 2px solid var(--accent-color); padding-bottom: 5px;
      color: var(--primary-color);}
  
  .form-control-main { width: 100%; padding: 12px; margin: 8px 0 16px 0; border: 1px solid #ddd;
      border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    
  button.btn-main { width: 100%; padding: 12px; border: none;
      border-radius: 8px; font-weight: bold;
      cursor: pointer; background: var(--primary-color); color: white; font-size: 16px; transition: 0.3s;
      touch-action: manipulation;
  }
  button.btn-main:hover { background: #059669;
  }
  button.btn-main:disabled { background: #ccc; }
  button.btn-checkout { background: #e65100; margin-top: 15px;}
  button.btn-checkout:hover { background: #bf360c;
  }
  
  .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee;
      align-items: center;}
  .stat-label { color: #65676b; font-size: 14px; }
  .stat-value { font-weight: bold; color: var(--primary-color); font-size: 16px;
  }
  .price-display { display: flex; align-items: center; gap: 10px; }
  
  .btn-edit { background: #e7f3ff; color: #1877f2;
      padding: 6px 12px; border-radius: 5px; font-size: 13px; border: none; cursor: pointer; font-weight: bold;
      touch-action: manipulation;
  }
  
  .data-section { overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
  th { background: #f8f9fa;
      color: #65676b; padding: 10px; text-align: left; font-size: 13px; text-transform: uppercase; }
  td { padding: 10px; border-top: 1px solid #f0f2f5;
      font-size: 15px; }

  /* TỐI ƯU KIẾN NGHỊ 2: Cài đặt khóa thanh tiêu đề bảng cuộn tĩnh độc lập trên di động */
  #historyDataTable thead th {
      position: sticky;
      top: 0;
      background: #f8f9fa;
      z-index: 5;
  }
  
  /* TỐI ƯU KIẾN NGHỊ 2: Tạo hiệu ứng Zebra vằn ngựa đan xen bằng dải màu hệ thống dịu mắt */
  #historyDataTable tbody tr:nth-child(even) {
      background-color: #f8fafc;
  }
  #historyDataTable tbody tr:nth-child(odd) {
      background-color: #ffffff;
  }

  /* --- MODAL --- */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; padding: 15px; box-sizing: border-box;
  }
  .modal-content { background: #fff; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center;
  }
  .modal-content h2 { margin-top: 0; color: var(--primary-color); }
  .modal-summary { background: #f9f9f9; padding: 15px; border-radius: 8px;
      margin: 20px 0; text-align: left; line-height: 1.8;}
  
  .input-thucnhan { width: 100%; padding: 12px; border: 2px solid #4caf50;
      border-radius: 8px;
      font-size: 18px; font-weight: bold; color: #2e7d32; box-sizing: border-box; text-align: right;}
  .input-thucnhan:focus { outline: none; border-color: #2e7d32;
  }
  
  .modal-actions { display: flex; gap: 15px; width: 100%; margin-top: 20px;}
  .modal-actions button { flex: 1;
      padding: 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; 
      touch-action: manipulation;
  }
  .btn-cancel { background-color: #f1f3f4; color: #444;
      border: 1px solid #dadce0; }
  .btn-cancel:hover { background-color: #e8eaed; }
  .btn-confirm { background-color: var(--primary-color); color: white;
  }
  .btn-confirm:hover { background-color: #059669; }
  
  .loading-overlay { display: none; text-align: center; color: var(--primary-color); font-size: 13px;
      margin-top: 10px; }
  .error-msg { color: var(--danger); text-align: center; padding: 10px; display: none; font-size: 14px; background: #ffebee; border-radius: 8px;
      margin-top: 10px;}
  .app-header { margin-bottom: 25px; max-width: 1200px; margin-left: auto; margin-right: auto;
      text-align: center;}

  /* --- CẤU HÌNH PHÂN LỚP ĐIỀU CHỈNH TRANG LỊCH SỬ BIẾN ĐỔI --- */
  .history-title {
      color: #059669;
      margin: 0;
      text-align: center;
      width: 100%;
      font-size: 24px;
      font-weight: 800;
      display: -webkit-box;
      -webkit-line-clamp: 2; /* TỐI ƯU KIẾN NGHỊ 1: Auto bóp hoặc ép chữ xuống tối đa 2 dòng */
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
  }

  /* Định dạng thanh công cụ Bottom dính đáy chuẩn vùng chạm ngón tay cái */
  .bottom-action-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--glass-bg);
      box-shadow: 0 -4px 25px rgba(0, 0, 0, 0.06);
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 30px;
      z-index: 999;
      box-sizing: border-box;
  }
  .btn-action-back {
      background: transparent;
      color: #64748b;
      border: none;
      font-size: 16px;
      font-weight: 600;
      padding: 8px 16px;
      cursor: pointer;
      touch-action: manipulation;
  }
  .btn-action-edit {
      background: transparent;
      color: #10b981;
      border: none;
      font-size: 16px;
      font-weight: 800;
      padding: 8px 16px;
      cursor: pointer;
      touch-action: manipulation;
  }

  /* Phân tách trạng thái hoạt động: Chỉ hiển thị cột Hành động khi mở khóa Edit Mode */
  .edit-mode-active .history-action-col {
      display: table-cell !important;
  }
  /* Điều phối nút sửa đơn giá khi ở trạng thái Edit Mode */
  .edit-mode-active #btnEditHistoryPrice {
      display: inline-block !important;
  }

  /* --- RESPONSIVE MOBILE SỬ DỤNG MEDIA QUERY AN TOÀN TUYỆT ĐỐI --- */
  @media (max-width: 850px) {
      .main-wrapper { grid-template-columns: 1fr;
      }
      .input-section { order: 1; }
      .data-section { order: 2;
      }
  }

  @media (max-width: 480px) {
      /* TỐI ƯU KIẾN NGHỊ 3: Ép Spacing/Padding co gọn tối đa diện tích rộng rãi trên Mobile dành riêng cho trang lịch sử */
      #historyView {
          padding: 5px !important;
      }
      #historyView .card {
          padding: 14px 10px !important;
          margin-bottom: 12px;
          border-radius: 10px;
      }
      #historyView table th, #historyView table td {
          padding: 8px 6px !important;
          font-size: 14px;
      }
      .history-title {
          font-size: 18px;
      }
      .bottom-action-bar {
          padding: 12px 20px;
      }
  }
</style>
