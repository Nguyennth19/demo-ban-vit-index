<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Phù Sa Farm - Xuất Vịt</title>
  
  <!-- Cấu hình chuẩn Responsive và giao diện cho thiết bị di động -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Xuất Vịt PS">
  
  <!-- Sửa đổi: Đồng bộ màu sắc hệ thống (Theme Color) với thanh trạng thái -->
  <meta name="theme-color" content="#10b981">

  <!-- Manifest liên kết PWA -->
  <link rel="manifest" href="./manifest.json">

  <!-- Biểu tượng ứng dụng -->
  <link rel="icon" type="image/png" sizes="192x192" href="./logo-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./logo-512.png">
  <link rel="shortcut icon" href="./logo-192.png">
  <link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMAAAADACAMAAABlS6sIAAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5ccllPAAAAA9QTFRF/wD/ECgp////GhoaAAAAt7gC0QAAAAl0Uk5T////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////AKM688wAAAF4SURBVHja7dEBAQAAAIDAl36vI8gAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAgKcCBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAAECBAgQIECAAgL8CzAADALidAA6B8X8HAAAAAElFTkSuQmCC">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #0f172a;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* ----------------- MÀN HÌNH CHỜ KHỞI ĐỘNG (SPLASH SCREEN) ----------------- */
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: url('./background.png') no-repeat center center;
      background-size: cover;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 80px;
      box-sizing: border-box;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }

    @media (min-width: 768px) {
      #splashScreen {
        padding-bottom: 10vh;
      }
    }

    .splash-content {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .progress-status {
      color: #ffffff;
      font-size: 14px;
      text-align: center;
      margin-bottom: 15px;
      line-height: 1.5;
      font-weight: 600;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
      background: rgba(15, 23, 42, 0.6);
      padding: 6px 16px;
      border-radius: 20px;
    }

    .progress-container {
      position: relative;
      width: 85%;
      max-width: 350px;
      height: 22px;
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #ffffff;
      border-radius: 11px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
      overflow: visible;
    }

    .progress-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #f59e0b 0%, #ef4444 100%);
      border-radius: 9px;
      transition: width 0.1s linear;
      position: relative;
    }

    .progress-bar-fill::after {
      content: '🦆';
      position: absolute;
      right: -10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    .progress-text {
      position: absolute;
      width: 100%;
      text-align: center;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      color: #ffffff;
      font-size: 12px;
      font-weight: 800;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.9);
    }

    /* ----------------- KHUNG BỌC BACKEND (IFRAME) ----------------- */
    #appFrame {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease-in-out; /* Hiệu ứng mờ dần mềm mại */
    }

    /* ----------------- NÚT CÀI ĐẶT PWA ANDROID ----------------- */
    .btn-install {
      position: fixed;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 25px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
      z-index: 100000;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }
    .btn-install:active { transform: translateX(-50%) scale(0.95); }
    
    /* ----------------- POPUP HƯỚNG DẪN CÀI ĐẶT IOS ----------------- */
    .ios-prompt {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.98);
      color: #1e293b;
      padding: 15px 20px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      text-align: center;
      font-size: 14px;
      width: 85%;
      max-width: 320px;
      z-index: 100000;
      border: 1px solid #e2e8f0;
      line-height: 1.6;
    }
    .ios-prompt b { color: #10b981; }
    .ios-prompt .close-ios {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .ios-prompt::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border-width: 10px 10px 0;
      border-style: solid;
      border-color: rgba(255, 255, 255, 0.98) transparent transparent transparent;
    }
    .hidden { display: none !important; }

    /* ----------------- BANNER THÔNG BÁO CẬP NHẬT PHIÊN BẢN (PWA) ----------------- */
    #updateBanner {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(150px);
      background: #1e293b;
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      width: 90%;
      max-width: 420px;
      font-size: 14px;
      font-weight: 500;
      z-index: 10000;
      border: 1px solid #334155;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #updateBanner.show {
      transform: translateX(-50%) translateY(0);
    }

    #updateBanner button {
      background: #10b981;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
      box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
      transition: all 0.2s;
    }

    #updateBanner button:hover {
      background: #059669;
    }
  </style>
</head>
<body>

  <!-- UI Cài đặt PWA Android -->
  <button id="btnInstallApp" class="btn-install hidden">📥 Cài đặt Ứng dụng</button>

  <!-- UI Cài đặt PWA iOS -->
  <div id="iosPrompt" class="ios-prompt hidden">
    <button class="close-ios" onclick="document.getElementById('iosPrompt').classList.add('hidden')">✕</button>
    Để cài đặt sử dụng Offline:<br>
    Nhấn biểu tượng <b>Chia sẻ</b> ở dưới cùng màn hình và chọn <b>"Thêm vào MH chính"</b>.
  </div>

  <!-- Màn hình chờ khởi động -->
  <div id="splashScreen">
    <div class="splash-content">
      <div class="progress-status" id="progressStatus">Đang kết nối máy chủ Phù Sa Farm...</div>
      <div class="progress-container">
        <div class="progress-bar-fill" id="progressBar"></div>
        <div class="progress-text" id="progressText">0%</div>
      </div>
    </div>
  </div>

  <!-- Iframe bọc ứng dụng Google Apps Script với Sandbox bảo mật cao -->
  <iframe id="appFrame" 
          sandbox="allow-scripts allow-top-navigation allow-forms allow-popups allow-same-origin"
          src="https://script.google.com/macros/s/AKfycbx9twBCefA-gFC4pn1UJh07Uj4_OE2Vgvhjb7TN_67zd1MHVkDXPMGxSJatDNB-Kdeh/exec" 
          allow="geolocation; microphone; camera">
  </iframe>

  <!-- Banner thông báo cập nhật PWA -->
  <div id="updateBanner">
    <span>✨ Phát hiện bản cập nhật mới tốt hơn!</span>
    <button onclick="reloadApp()">Tải lại</button>
  </div>

  <script>
    // ==========================================
    //       QUẢN LÝ TIẾN TRÌNH KHỞI ĐỘNG (SPLASH)
    // ==========================================
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const progressStatus = document.getElementById('progressStatus');
    const splashScreen = document.getElementById('splashScreen');
    const appFrame = document.getElementById('appFrame');

    let currentPercent = 0;

    const interval = setInterval(() => {
      if (currentPercent < 85) {
        currentPercent += Math.floor(Math.random() * 5) + 1;
        if (currentPercent > 85) currentPercent = 85;
        progressBar.style.width = currentPercent + '%';
        progressText.innerText = currentPercent + '%';
        
        if (currentPercent > 50) {
          progressStatus.innerText = "Đang đồng bộ cơ sở dữ liệu sọt...";
        } else if (currentPercent > 25) {
          progressStatus.innerText = "Đang chuẩn bị môi trường offline...";
        }
      }
    }, 100);

    window.addEventListener('message', function (event) {
      if (event.data && event.data.type === 'APP_READY') {
        finishLoading();
      }
    });

    function finishLoading() {
      clearInterval(interval);
      progressBar.style.width = '100%';
      progressText.innerText = '100%';
      progressStatus.innerText = 'Đã tải thành công!';
      
      // Hiệu ứng Fade-out Splash và Fade-in Iframe
      setTimeout(() => {
        splashScreen.style.opacity = '0';
        splashScreen.style.visibility = 'hidden';
        
        appFrame.style.display = 'block';
        setTimeout(() => {
          appFrame.style.opacity = '1';
        }, 50);

        setTimeout(() => { 
          splashScreen.remove(); 
        }, 500);
      }, 300);
    }

    setTimeout(() => {
      if (document.getElementById('splashScreen')) {
        console.warn("Iframe tải quá lâu, kích hoạt chế độ Fallback...");
        finishLoading();
      }
    }, 12000);

    // ==========================================
    //       XỬ LÝ CÀI ĐẶT PWA (ANDROID & IOS)
    // ==========================================
    
    // 1. Dành cho Android (Bắt sự kiện tự động)
    let deferredPrompt;
    const btnInstallApp = document.getElementById('btnInstallApp');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      btnInstallApp.classList.remove('hidden'); // Hiện nút cài đặt
    });

    btnInstallApp.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          console.log('Nông dân đã chấp nhận cài đặt App');
        }
        deferredPrompt = null;
        btnInstallApp.classList.add('hidden');
      }
    });

    // 2. Dành cho iOS (Hướng dẫn thủ công vì Apple không hỗ trợ auto)
    const iosPrompt = document.getElementById('iosPrompt');
    const isIos = () => {
      const userAgent = window.navigator.userAgent.toLowerCase();
      return /iphone|ipad|ipod/.test(userAgent);
    };
    const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

    if (isIos() && !isInStandaloneMode()) {
      iosPrompt.classList.remove('hidden');
      // Tự động ẩn sau 15 giây để không che mất màn hình nếu người dùng không muốn cài
      setTimeout(() => {
        iosPrompt.classList.add('hidden');
      }, 15000);
    }

    // ==========================================
    //       ĐĂNG KÝ VÀ KIỂM SOÁT SERVICE WORKER
    // ==========================================
    let newworker;

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          console.log('Service Worker đã đăng ký thành công.', reg);

          reg.addEventListener('updatefound', () => {
            newworker = reg.installing;
            newworker.addEventListener('statechange', () => {
              if (newworker.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateBanner();
              }
            });
          });
        }).catch(err => {
          console.error('Đăng ký Service Worker thất bại:', err);
        });
      });

      let refreshing;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        window.location.reload(); 
        refreshing = true;
      });
    }

    function showUpdateBanner() {
      document.getElementById('updateBanner').classList.add('show');
    }

    function reloadApp() {
      if (newworker) {
        newworker.postMessage({ action: 'skipWaiting' });
      } else {
        navigator.serviceWorker.getRegistration().then(reg => {
          if (reg && reg.waiting) {
            reg.waiting.postMessage({ action: 'skipWaiting' });
          } else {
            window.location.reload();
          }
        });
      }
    }
  </script>
</body>
</html>
