<!-- GIAO DIỆN KHỞI TẠO ĐỢT CÂN (LANDING VIEW) -->
<div id="landingView" class="view-container">
  <div class="bg-pattern"></div>
  <div class="floating-icons">
    <i class="bi bi-clipboard-data floating-icon icon-1"></i>
    <i class="bi bi-cash-coin floating-icon icon-2"></i>
    <i class="bi bi-box-seam floating-icon icon-3"></i>
    <i class="bi bi-graph-up-arrow floating-icon icon-4"></i>
    <i class="bi bi-calculator floating-icon icon-5"></i>
    <i class="bi bi-journal-text floating-icon icon-6"></i>
    <i class="bi bi-truck floating-icon icon-7"></i>
    <i class="bi bi-feather floating-icon icon-8"></i>
  </div>
  <div class="glow-orbs">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>
  <div class="center-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Phù Sa Farm</h1>
        <p>Hệ Thống Quản Lý Xuất Vịt</p>
      </div>
      <div class="form-group">
        <label class="form-label">Đợt xuất hoặc Thương lái</label>
        <div class="input-wrapper">
          <input type="text" id="ld_tenDot" list="merchantList" class="form-control text-center" placeholder="Ví dụ: Lái buôn A" autocomplete="off">
          <datalist id="merchantList"></datalist>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Đơn giá (đ/kg)</label>
        <div class="input-wrapper">
          <input type="text" inputmode="decimal" id="ld_donGia" class="form-control text-center" placeholder="Ví dụ: 55.000" autocomplete="off">
        </div>
      </div>
      <button type="button" class="btn-auth btn-green w-100" onclick="startNewBatch()">
        BẮT ĐẦU NHẬP MỚI
      </button>
      
      <hr class="custom-divider">
      
      <button type="button" class="history-action w-100" id="btnLoadLast" onclick="loadLastBatch()" style="background: none; border: none;">
        Xem lại lần cân gần nhất
      </button>
      
      <!-- Nút đăng xuất nhỏ giấu ở góc để user có thể thoát -->
      <button type="button" class="w-100 mt-2" onclick="doLogout()" style="background: none; border: none; color: #64748b; font-size: 13px; text-decoration: underline;">
        Thoát tài khoản
      </button>

      <div class="trust-badges mt-3">
        <div class="trust-badge"><i class="bi bi-shield-check"></i> SSL Secured</div>
        <div class="trust-badge"><i class="bi bi-lock"></i> Encrypted</div>
      </div>
    </div>
  </div>
</div>
