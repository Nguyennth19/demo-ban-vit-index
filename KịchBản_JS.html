<script>
// ==========================================
// TÍCH HỢP BẢO MẬT ĐĂNG NHẬP (LẤY TỪ SHEET ACCOUNT)
// ==========================================
const AUTH_KEY = 'PHUSA_AUTH_KEY';

function getAuthCache() {
  try {
    const authData = localStorage.getItem(AUTH_KEY);
    return authData ? JSON.parse(authData) : null;
  } catch (e) {
    return null;
  }
}

// Hàm Xử lý Đăng nhập giao tiếp với Google Apps Script
function doLogin() {
  const usernameInput = document.getElementById('login_username').value.trim();
  const passwordInput = document.getElementById('login_password').value.trim();
  const errorBox = document.getElementById('loginErrorBox');
  const btnSubmit = document.getElementById('btnLoginSubmit');
  
  if (!usernameInput || !passwordInput) {
    errorBox.innerText = "Vui lòng nhập đầy đủ Tài khoản và Mật khẩu!";
    errorBox.style.display = 'block';
    return;
  }
  
  // Hiệu ứng Loading
  btnSubmit.innerText = "Đang kiểm tra...";
  btnSubmit.disabled = true;
  errorBox.style.display = 'none';
  
  // Gửi request lên Backend kiểm tra sheet "Account"
  google.script.run
    .withSuccessHandler((result) => {
      btnSubmit.innerText = "Đăng nhập";
      btnSubmit.disabled = false;
      
      if (result.success) {
        // Lưu thông tin xác thực vào cache
        const authPayload = { 
          username: usernameInput, 
          token: result.token, // server trả về token để dùng cho các API sau
          timestamp: new Date().getTime() 
        };
        localStorage.setItem(AUTH_KEY, JSON.stringify(authPayload));
        
        // Điều hướng vào màn hình khởi tạo
        renderView();
      } else {
        // Sai tài khoản / mật khẩu
        errorBox.innerText = result.message || "Tài khoản hoặc mật khẩu không đúng!";
        errorBox.style.display = 'block';
      }
    })
    .withFailureHandler((err) => {
      btnSubmit.innerText = "Đăng nhập";
      btnSubmit.disabled = false;
      errorBox.innerText = "Lỗi mạng: " + err.message;
      errorBox.style.display = 'block';
    })
    .verifyLogin(usernameInput, passwordInput);
}

// Hàm Xử lý Đăng xuất
function doLogout() {
  if (confirm("Bạn có chắc chắn muốn đăng xuất?")) {
    localStorage.removeItem(AUTH_KEY);
    
    // Reset state về mặc định
    state.status = 'LANDING';
    saveState();
    
    // Clear dữ liệu trên form đăng nhập
    if(document.getElementById('login_username')) document.getElementById('login_username').value = '';
    if(document.getElementById('login_password')) document.getElementById('login_password').value = '';
    if(document.getElementById('loginErrorBox')) document.getElementById('loginErrorBox').style.display = 'none';
    
    renderView();
  }
}

// CẬP NHẬT HÀM RENDER VIEW: Quản lý Luồng Hiển Thị SPA (Single Page Application)
function renderView() {
  const loginView = document.getElementById('loginView');
  const landingView = document.getElementById('landingView');
  const mainView = document.getElementById('mainView');
  const historyView = document.getElementById('historyView');
  
  const auth = getAuthCache();
  
  // NẾU CHƯA ĐĂNG NHẬP (Chặn luồng, buộc hiển thị trang đăng nhập)
  if (!auth || !auth.token) {
    if(loginView) loginView.classList.add('active');
    if(landingView) landingView.classList.remove('active');
    if(mainView) mainView.classList.remove('active');
    if(historyView) historyView.classList.remove('active');
    return;
  } else {
    if(loginView) loginView.classList.remove('active');
  }

  // NẾU ĐÃ ĐĂNG NHẬP: Logic SPA cũ tiếp tục hoạt động
  if (state.status === 'LANDING') {
    if(landingView) landingView.classList.add('active');
    if(mainView) mainView.classList.remove('active');
    if(historyView) historyView.classList.remove('active');
  } else if (state.status === 'WEIGHING') {
    if(landingView) landingView.classList.remove('active');
    if(mainView) mainView.classList.add('active');
    if(historyView) historyView.classList.remove('active');
    
    // Nạp dữ liệu cũ đang dở dang
    if (state.startRow !== null) {
      setLoading(true, 'Đang khôi phục dữ liệu...');
      google.script.run
        .withSuccessHandler((data) => {
          updateMainUI(data);
          setLoading(false);
          notifyAppReady();
        })
        .withFailureHandler(handleNetError)
        .getBatchData(auth, state.startRow); // Gửi kèm token
    }
  } else if (state.status === 'HISTORY') {
    if(landingView) landingView.classList.remove('active');
    if(mainView) mainView.classList.remove('active');
    if(historyView) historyView.classList.add('active');
    
    if (state.startRow !== null) {
      setHistoryLoading(true, 'Đang tải dữ liệu đợt cũ...');
      google.script.run
        .withSuccessHandler((data) => {
          updateHistoryUI(data);
          setHistoryLoading(false);
          notifyAppReady();
        })
        .withFailureHandler((err) => {
          showHistoryError("Lỗi tải lịch sử: " + err.message);
          setHistoryLoading(false);
          notifyAppReady();
        })
        .getBatchData(auth, state.startRow); // Gửi kèm token
    }
  }
}
</script>
